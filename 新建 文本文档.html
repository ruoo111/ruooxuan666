<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>悠游假期 | 携程风格旅行首页 - 大字版精选旅行团</title>
    <!-- 引入Google Fonts提升字体质感 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 免费图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f9ff;
            color: #1a2c3e;
            line-height: 1.4;
        }

        /* 主容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ========= 头部导航 (LOGO字体特别放大) ========= */
        .header {
            background-color: white;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.03);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0;
            flex-wrap: wrap;
        }

        /* LOGO 区域字体显著放大 */
        .logo {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(135deg, #1e6fdf, #ff7a45);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo i {
            background: none;
            -webkit-background-clip: unset;
            color: #ff7a45;
            font-size: 42px;
        }

        .nav-links {
            display: flex;
            gap: 36px;
            font-weight: 600;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3f55;
            transition: color 0.2s;
            font-size: 1rem;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #1e6fdf;
        }

        .nav-right {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-right i {
            font-size: 1.3rem;
            color: #4b6584;
            cursor: pointer;
        }

        .btn-outline {
            border: 1.5px solid #1e6fdf;
            background: transparent;
            padding: 8px 22px;
            border-radius: 40px;
            color: #1e6fdf;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }

        /* ========= Hero 区域 (大气风景) ========= */
        .hero {
            background: linear-gradient(0deg, rgba(0,0,0,0.35), rgba(0,0,0,0.2)), url('https://images.pexels.com/photos/1488465/pexels-photo-1488465.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover no-repeat;
            min-height: 500px;
            border-radius: 0 0 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 56px;
        }

        .hero-content {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 3.6rem;
            font-weight: 800;
            text-shadow: 0 3px 14px rgba(0,0,0,0.4);
            margin-bottom: 18px;
            letter-spacing: -0.3px;
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 36px;
            font-weight: 500;
        }

        .search-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            border-radius: 70px;
            padding: 10px 16px 10px 28px;
            display: inline-flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 32px rgba(0,0,0,0.2);
        }

        .search-card input, .search-card button {
            border: none;
            background: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
        }

        .search-card input {
            width: 300px;
            font-size: 1rem;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
        }

        .search-card button {
            background: #1e6fdf;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        /* ========= 核心区域: 三个旅行团 (字体放大突出) ========= */
        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        /* 旅行团字样显著放大 */
        .section-header h2 {
            font-size: 42px;
            font-weight: 800;
            position: relative;
            display: inline-block;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e6fdf, #ff7a45);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .section-header h2 i {
            background: none;
            -webkit-background-clip: unset;
            color: #ff7a45;
            font-size: 40px;
            margin-right: 8px;
        }

        .section-header a {
            color: #1e6fdf;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px dashed #1e6fdf;
        }

        /* 三列网格 突出三个旅行团 */
        .triple-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            margin-bottom: 70px;
        }

        /* 旅行团卡片 - 加强版 */
        .tour-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.08);
            transition: transform 0.25s ease, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .tour-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 40px rgba(0, 0, 0, 0.14);
        }

        .card-img {
            height: 250px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .card-tag {
            position: absolute;
            top: 18px;
            left: 18px;
            background: #ff5e3a;
            color: white;
            font-size: 14px;
            font-weight: 800;
            padding: 6px 18px;
            border-radius: 40px;
            letter-spacing: 0.5px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        .card-content {
            padding: 24px 22px 26px;
            flex: 1;
        }

        /* 旅行团名称放大 */
        .card-title {
            font-size: 1.7rem;
            font-weight: 800;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            line-height: 1.3;
        }

        /* 价格醒目放大 */
        .price {
            color: #ff5e3a;
            font-weight: 900;
            font-size: 2rem;
            line-height: 1;
        }

        .price small {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6c7a89;
        }

        /* 时长信息行 字体加大 */
        .info-row {
            display: flex;
            gap: 24px;
            margin: 14px 0 14px;
            font-size: 1rem;
            font-weight: 500;
            color: #2d4259;
            flex-wrap: wrap;
        }

        .info-row i {
            width: 22px;
            color: #1e6fdf;
            font-size: 1.1rem;
            margin-right: 6px;
        }

        /* 住宿条件区域：字体加粗加大 */
        .accommodation {
            background: #ecf5fe;
            padding: 12px 18px;
            border-radius: 48px;
            font-size: 0.95rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #1a4972;
            width: fit-content;
            margin: 8px 0 10px;
        }

        .accommodation i {
            font-size: 1rem;
            color: #1e6fdf;
        }

        .card-footer {
            margin-top: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1.5px solid #eef2fa;
            padding-top: 18px;
        }

        .rating {
            color: #f5a623;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .btn-book {
            background: none;
            border: 2px solid #1e6fdf;
            padding: 10px 26px;
            border-radius: 50px;
            color: #1e6fdf;
            font-weight: 800;
            font-size: 0.9rem;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-book:hover {
            background: #1e6fdf;
            color: white;
        }

        /* 风景+住宿氛围区 */
        .inspire-section {
            background: #ffffff;
            border-radius: 36px;
            padding: 36px 30px;
            margin: 30px 0 60px;
            box-shadow: 0 12px 26px rgba(0,0,0,0.04);
        }

        .inspire-title {
            font-weight: 800;
            font-size: 28px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #1a2c3e;
        }

        .inspire-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 22px;
        }

        .scene-card {
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            height: 190px;
            background-size: cover;
            background-position: center;
            transition: transform 0.2s;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
        }

        .scene-card:hover {
            transform: scale(0.97);
        }

        .scene-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 15px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
        }

        footer {
            background: #0f212f;
            color: #cbdde9;
            padding: 50px 0 28px;
            border-radius: 40px 40px 0 0;
            margin-top: 40px;
        }

        .footer-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 40px;
        }

        .copyright {
            text-align: center;
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        @media (max-width: 980px) {
            .triple-grid {
                grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            }
            .inspire-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .section-header h2 {
                font-size: 34px;
            }
            .card-title {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 720px) {
            .nav-bar {
                flex-direction: column;
                gap: 16px;
            }
            .logo {
                font-size: 32px;
            }
            .hero-content h1 {
                font-size: 2rem;
            }
            .search-card {
                flex-direction: column;
                background: rgba(0,0,0,0.7);
                border-radius: 40px;
                padding: 18px;
            }
            .search-card input, .search-card button {
                width: 100%;
            }
            .section-header h2 {
                font-size: 28px;
            }
            .inspire-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="nav-bar">
            <!-- LOGO 字体显著放大，图标和文字都加大 -->
            <div class="logo"><i class="fas fa-plane-departure"></i> 悠游假期</div>
            <div class="nav-links">
                <a href="#" class="active">首页</a>
                <a href="#">旅行团</a>
                <a href="#">自由行</a>
                <a href="#">酒店·民宿</a>
                <a href="#">目的地</a>
            </div>
            <div class="nav-right">
                <i class="fas fa-search"></i>
                <i class="far fa-heart"></i>
                <i class="far fa-user-circle"></i>
                <button class="btn-outline">登录 / 注册</button>
            </div>
        </div>
    </div>
</header>

<!-- 英雄区域：风景与搜索框 -->
<section class="hero">
    <div class="hero-content">
        <h1>奔赴山海，即刻出发</h1>
        <p>跟团游 · 私家团 · 安心住宿</p>
        <div class="search-card">
            <input type="text" placeholder="🔍 搜索目的地、景点或旅行团" id="searchInput">
            <button id="searchBtn">搜索团期</button>
        </div>
    </div>
</section>

<div class="container">
    <!-- 核心区域：三个旅行团 字样显著放大 -->
    <div class="section-header">
        <h2><i class="fas fa-umbrella-beach"></i> 热门旅行团 · 精选推荐</h2>
        <a href="#">查看全部行程 <i class="fas fa-arrow-right"></i></a>
    </div>

    <!-- 三个旅行团卡片容器，包含价格/时长/住宿/风景图 -->
    <div class="triple-grid" id="tourGrid">
        <!-- 三个旅行团由js动态渲染，确保每个卡片信息完整且大字体突出 -->
    </div>

    <!-- 额外风景+住宿氛围展示（强化住宿条件和风景图） -->
    <div class="inspire-section">
        <div class="inspire-title">
            <i class="fas fa-hotel" style="color:#ff7a45;"></i> 严选住宿 · 醉美风景 
            <span style="font-size: 0.9rem; font-weight: normal;">推窗即景，奢享睡眠</span>
        </div>
        <div class="inspire-grid" id="inspireGallery">
            <!-- 动态渲染4个住宿/风景美图 -->
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <div class="footer-grid">
            <div><h4><i class="fas fa-globe-asia"></i> 悠游假期</h4><p>高端旅行定制专家</p></div>
            <div><h4>关于我们</h4><p>品质保障 · 7x24h服务</p></div>
            <div><h4>客服中心</h4><p>📞 1010-9966</p><p>hello@youyou.travel</p></div>
        </div>
        <div class="copyright">© 2025 悠游假期 | 像携程一样专业，比想象更贴心 | 价格/时长/住宿以实际出团为准</div>
    </div>
</footer>

<script>
    // ---------- 定义三个旅行团数据（完全满足：价格、旅行时长、住宿条件、风景图）----------
    const threeTours = [
        {
            id: 1,
            name: "【奢享云南】丽江·大理·香格里拉",
            price: 4280,
            duration: "7天6晚",
            accommodation: "五星纳西庭院酒店 + 雪山观景房 + 藏式供氧",
            image: "https://images.pexels.com/photos/1464679/pexels-photo-1464679.jpeg?auto=compress&cs=tinysrgb&w=800",
            rating: 4.9,
            tag: "明星同款",
            description: "玉龙雪山冰川索道+普达措国家公园+松赞林寺"
        },
        {
            id: 2,
            name: "【海岛之恋】三亚·蜈支洲岛纯玩",
            price: 2999,
            duration: "5天4晚",
            accommodation: "临海五星度假酒店·海景房+私人沙滩+无边泳池",
            image: "https://images.pexels.com/photos/1036657/pexels-photo-1036657.jpeg?auto=compress&cs=tinysrgb&w=800",
            rating: 4.8,
            tag: "爆款限时",
            description: "含浮潜/海鲜自助/免税店VIP接送"
        },
        {
            id: 3,
            name: "【秘境川西】稻城亚丁+墨石公园",
            price: 5299,
            duration: "8天7晚",
            accommodation: "藏式轻奢民宿 + 四钻供氧酒店 + 地暖",
            image: "https://images.pexels.com/photos/2341830/pexels-photo-2341830.jpeg?auto=compress&cs=tinysrgb&w=800",
            rating: 4.9,
            tag: "深度体验",
            description: "从你的全世界路过拍摄地| 亚丁长线徒步"
        }
    ];

    // 额外的住宿和风景美图（进一步展示高品质住宿和风景）
    const inspireData = [
        { title: "丽江·金茂璞修雪山酒店", desc: "直面玉龙雪山 | 供氧套房", img: "https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg?auto=compress&cs=tinysrgb&w=600", type: "住宿" },
        { title: "桂林阳朔·画山云舍", desc: "山水画卷无边泳池 | 顶级民宿", img: "https://images.pexels.com/photos/1680300/pexels-photo-1680300.jpeg?auto=compress&cs=tinysrgb&w=600", type: "住宿" },
        { title: "稻城亚丁·牛奶海", desc: "蓝色星球最后一片净土", img: "https://images.pexels.com/photos/2663915/pexels-photo-2663915.jpeg?auto=compress&cs=tinysrgb&w=600", type: "风景" },
        { title: "新疆喀纳斯·月亮湾", desc: "神仙湾晨雾 | 童话边城", img: "https://images.pexels.com/photos/1677106/pexels-photo-1677106.jpeg?auto=compress&cs=tinysrgb&w=600", type: "风景" }
    ];

    // 渲染三个旅行团卡片 (所有信息字体都相应放大，突出价格/时长/住宿)
    function renderThreeTours() {
        const gridContainer = document.getElementById('tourGrid');
        if (!gridContainer) return;

        const cardsHTML = threeTours.map(tour => `
            <div class="tour-card" data-id="${tour.id}">
                <div class="card-img" style="background-image: url('${tour.image}');">
                    <div class="card-tag">${tour.tag}</div>
                </div>
                <div class="card-content">
                    <div class="card-title">
                        <span>${tour.name}</span>
                        <span class="price">¥${tour.price.toLocaleString()}<small>起</small></span>
                    </div>
                    <!-- 旅行时长信息 字体放大 -->
                    <div class="info-row">
                        <span><i class="far fa-calendar-alt"></i> 行程时长：${tour.duration}</span>
                        <span><i class="fas fa-star" style="color:#f5a623;"></i> ${tour.rating} · 超赞</span>
                    </div>
                    <!-- 住宿条件区块 强化显示 -->
                    <div class="accommodation">
                        <i class="fas fa-bed"></i> 住宿条件：${tour.accommodation}
                    </div>
                    <div class="info-row" style="margin-top: 8px;">
                        <span><i class="fas fa-map-pin"></i> 行程亮点</span>
                        <span style="font-weight:500;">${tour.description.substring(0, 36)}${tour.description.length > 36 ? '…' : ''}</span>
                    </div>
                    <div class="card-footer">
                        <div class="rating"><i class="fas fa-thumbs-up"></i> 满意度 98% · 安心出游</div>
                        <button class="btn-book">立即预订</button>
                    </div>
                </div>
            </div>
        `).join('');

        gridContainer.innerHTML = cardsHTML;
    }

    // 渲染风景/住宿区域 (强调住宿条件和风景)
    function renderInspireGallery() {
        const galleryContainer = document.getElementById('inspireGallery');
        if (galleryContainer) {
            const itemsHTML = inspireData.map(item => `
                <div class="scene-card" style="background-image: url('${item.img}');">
                    <div class="scene-overlay">
                        <i class="fas ${item.type === '住宿' ? 'fa-hotel' : 'fa-mountain-sun'}"></i> ${item.title}<br>
                        <span style="font-size: 0.75rem; font-weight: 400;">${item.desc}</span>
                    </div>
                </div>
            `).join('');
            galleryContainer.innerHTML = itemsHTML;
        }
    }

    // 搜索功能（基于旅行团名称、住宿条件或亮点实时筛选三个旅行团）
    const searchBtn = document.getElementById('searchBtn');
    const searchInput = document.getElementById('searchInput');

    function filterToursByKeyword(keyword) {
        if (!keyword.trim()) {
            renderThreeTours();
            return;
        }
        const lowerKeyword = keyword.toLowerCase();
        const filtered = threeTours.filter(tour =>
            tour.name.toLowerCase().includes(lowerKeyword) ||
            tour.accommodation.toLowerCase().includes(lowerKeyword) ||
            tour.description.toLowerCase().includes(lowerKeyword) ||
            tour.duration.toLowerCase().includes(lowerKeyword)
        );
        const gridContainer = document.getElementById('tourGrid');
        if (filtered.length === 0) {
            gridContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 70px 20px; background:#fff; border-radius: 48px;">
                <i class="fas fa-map-marked-alt" style="font-size: 56px; color:#aaa;"></i>
                <p style="margin-top: 20px; font-size: 1.2rem; font-weight: 500;">未找到相关旅行团，试试“云南”或“三亚”～</p>
            </div>`;
            return;
        }
        // 重新渲染筛选后的卡片（同样保持大字体风格）
        const filteredHTML = filtered.map(tour => `
            <div class="tour-card" data-id="${tour.id}">
                <div class="card-img" style="background-image: url('${tour.image}');">
                    <div class="card-tag">${tour.tag}</div>
                </div>
                <div class="card-content">
                    <div class="card-title">
                        <span>${tour.name}</span>
                        <span class="price">¥${tour.price.toLocaleString()}<small>起</small></span>
                    </div>
                    <div class="info-row">
                        <span><i class="far fa-calendar-alt"></i> 行程时长：${tour.duration}</span>
                        <span><i class="fas fa-star" style="color:#f5a623;"></i> ${tour.rating}</span>
                    </div>
                    <div class="accommodation">
                        <i class="fas fa-bed"></i> 住宿条件：${tour.accommodation}
                    </div>
                    <div class="info-row" style="margin-top: 8px;">
                        <span><i class="fas fa-map-pin"></i> 亮点</span>
                        <span>${tour.description.substring(0, 34)}</span>
                    </div>
                    <div class="card-footer">
                        <div class="rating"><i class="fas fa-thumbs-up"></i> 满意度 98%</div>
                        <button class="btn-book">立即预订</button>
                    </div>
                </div>
            </div>
        `).join('');
        gridContainer.innerHTML = filteredHTML;
    }

    function performSearch() {
        const keyword = searchInput.value.trim();
        filterToursByKeyword(keyword);
    }

    if (searchBtn) {
        searchBtn.addEventListener('click', performSearch);
    }
    if (searchInput) {
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    }

    // 预订按钮交互（模拟）
    document.addEventListener('click', (e) => {
        if (e.target.classList && e.target.classList.contains('btn-book')) {
            alert('✨ 感谢选择悠游假期！专属旅行管家将尽快联系您，确认行程及价格优惠。');
        }
    });

    // 页面加载渲染核心三个旅行团 + 风景住宿区域
    renderThreeTours();
    renderInspireGallery();
</script>
</body>
</html>
